<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#eef2f7;
}

.container{
    max-width:700px;
    margin:40px auto;
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.header{
    background:#0b2e4a;
    color:#fff;
    text-align:center;
    padding:40px 20px;
}

.logo{
    width:120px;
    height:120px;
    border-radius:12px;
    object-fit:cover;
    margin-bottom:15px;
    border:3px solid #fff;
}

.content{
    padding:30px;
}

.card{
    background:#f6f8fb;
    padding:20px;
    margin-bottom:15px;
    border-radius:12px;
}

.card h2{
    color:#0b2e4a;
    margin-bottom:10px;
}

.button{
    display:block;
    text-align:center;
    padding:14px;
    background:#1e88e5;
    color:#fff;
    text-decoration:none;
    border-radius:10px;
    margin-top:10px;
}

.button:hover{
    background:#1565c0;
}

.footer{
    text-align:center;
    padding:20px;
    font-size:13px;
    color:#777;
    background:#f1f1f1;
}
</style>

</head>
<body>

<div class="container">

<div class="header">

<!-- لوگوی موقت (قابل تغییر) -->
<img class="logo" src="https://via.placeholder.com/150" alt="Logo">

<h1>Your Company Name</h1>
<p>Product Information Page</p>

</div>

<div class="content">

<div class="card">
<h2>Product</h2>
<p>Hydraulic Rescue Equipment System</p>
</div>

<div class="card">
<h2>Warranty</h2>
<p>✔ 1 Year Warranty</p>
<p>✔ Full After-Sales Support</p>
</div>

<div class="card">
<h2>Manual</h2>
<p>Download product documentation</p>
<a class="button" href="#">Download PDF</a>
</div>

<div class="card">
<h2>Contact</h2>
<p>Phone: +98 XXX XXX XXXX</p>
<p>Email: info@company.com</p>
</div>

</div>

<div class="footer">
© 2026 All Rights Reserved
</div>

</div>

</body>
</html>
